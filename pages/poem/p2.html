	    <p class="content">
	    Cứ cô đơn trong vòng đời vội vã!<br />
	    Bạn hữu nhiều tri kỉ được mấy ai!<br />
	    Lúc cạnh nhau ta vui cười ta nói<br />
	    Lúc xa rồi ta thơ thẩn mình ta<br />
